<div id="side-figures" class="side-figures"{% if oob %} hx-swap-oob="true"{% endif %}>
  <div class="figure">
    <span class="fig-icon">🗂️</span>
    <div><div class="fig-n">{{ donut_total }}</div><div class="fig-l">Videos tracked</div></div>
  </div>
  <a class="figure" href="/groups">
    <span class="fig-icon">🔁</span>
    <div><div class="fig-n">{{ group_count }}</div><div class="fig-l">Duplicate groups</div></div>
  </a>
  <div class="figure">
    <span class="fig-icon">💾</span>
    <div><div class="fig-n">{{ reclaimable | human_size }}</div><div class="fig-l">Reclaimable</div></div>
  </div>
</div>
