<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CopyCat — {% block title %}{% endblock %}</title>
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="icon" type="image/webp" href="/static/logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <div class="bg-aurora" aria-hidden="true"></div>
  <nav class="nav">
    <a class="brand" href="/" aria-label="CopyCat home">
      <img src="/static/logo2.svg" alt="" class="brand-cat">
      <img src="/static/logo1.svg" alt="CopyCat" class="brand-word">
    </a>
    <div class="nav-links">
      <a href="/groups" class="navi {{ 'on' if active == 'groups' }}" aria-label="Duplicates" data-tip="Duplicates">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M4 16V5a1 1 0 0 1 1-1h11"/></svg>
      </a>
      <a href="/library" class="navi {{ 'on' if active == 'library' }}" aria-label="Library" data-tip="Library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg>
      </a>
      <a href="/trash" class="navi {{ 'on' if active == 'trash' }}" aria-label="Trash" data-tip="Trash">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><path d="M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </a>
      <a href="/settings" class="navi {{ 'on' if active == 'settings' }}" aria-label="Settings" data-tip="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.4"/><line x1="11" y1="8" x2="20" y2="8"/><line x1="4" y1="8" x2="5.6" y2="8"/><circle cx="16" cy="16" r="2.4"/><line x1="4" y1="16" x2="13.6" y2="16"/><line x1="18.4" y1="16" x2="20" y2="16"/></svg>
      </a>
    </div>
  </nav>

  <div class="layout">
    <!-- Persistent dashboard rail (present on every page; loads live via HTMX) -->
    <aside class="dash-side glass">
      <div class="side-head"><h1>Overview</h1></div>
      <button class="btn primary big" hx-post="/api/scan" hx-target="#queue-status" hx-swap="outerHTML">
        🔍 Scan input folder
      </button>
      <div id="queue-status" class="queue-mini" hx-get="/api/status" hx-trigger="load, every 2s" hx-swap="outerHTML"></div>
      <div id="dash-donut" class="panel glass side-panel"></div>
      <div id="dash-gauge" class="panel glass side-panel"></div>
    </aside>

    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Lightbox overlay for enlarged stills -->
  <div id="lightbox" class="lightbox" onclick="this.classList.remove('show')">
    <img id="lightbox-img" src="" alt="">
  </div>
  <script>
    // Enlarge a still on click.
    document.addEventListener('click', function (e) {
      const t = e.target;
      if (t.matches('img.thumb')) {
        const box = document.getElementById('lightbox');
        document.getElementById('lightbox-img').src = t.src;
        box.classList.add('show');
      }
    });
    // Synchronise horizontal scroll across every filmstrip.
    (function () {
      let syncing = false;
      document.addEventListener('scroll', function (e) {
        const el = e.target;
        if (syncing || !el.classList || !el.classList.contains('film')) return;
        syncing = true;
        const x = el.scrollLeft;
        document.querySelectorAll('.film').forEach(function (f) {
          if (f !== el) f.scrollLeft = x;
        });
        requestAnimationFrame(function () { syncing = false; });
      }, true);  // capture: scroll events don't bubble
    })();
  </script>
</body>
</html>
